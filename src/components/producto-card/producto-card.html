<article class="card">
  <!-- ngSrc habilita optimizacion de imagenes con NgOptimizedImage. -->
  <img
    class="img"
    [ngSrc]="product().imageUrl"
    [alt]="product().name"
    width="320"
    height="260"
  />

  <div class="body">
    <!-- La parte de arriba de la tarjeta: nombre y precio. -->
    <div class="top">
      <h3 class="title">{{ product().name }}</h3>
      <span class="price">{{ product().price | currency: 'MXN' }}</span>
    </div>

    <p class="meta">{{ product().category }}</p>
    <p class="desc">{{ product().description }}</p>

    <!-- El estado de stock condiciona texto, color y disponibilidad del boton. -->
    <p class="stock" [class.out]="!product().inStock">
      @if (product().inStock) {
        En stock
      } @else {
        Agotado
      }
    </p>

    <!-- Si no hay stock, el boton se desactiva para bloquear la accion. -->
    <button
      class="btn"
      type="button"
      [disabled]="!product().inStock"
      [attr.aria-label]="'Agregar ' + product().name + ' al carrito'"
      (click)="onAdd()"
    >
      Agregar al carrito
    </button>
  </div>
</article>
